id: library_newsreels
title: "spanish civil war newsreel library sweep"
duration_target_sec: 360

voice:
  mode: voice_only
  narration_wav: null

style:
  theme: "noir_doc"
  aspect: "16:9"
  fps: 30
  font_family: "Inter"
  safe_margin_px: 80
  accent_color: "burnt_red"

sources:
  enable_commons: false
  enable_internet_archive: true
  commons:
    max_assets_per_beat: 1
    min_resolution_px: 1000
  internet_archive:
    max_assets_per_beat: 3
    max_clip_sec: 12

guardrails:
  require_license_metadata: true
  block_ai_generated_archival: true
  require_source_urls_in_credits: true

beats:
  - id: reels_overview
    type: archival_clip
    duration_sec: 30
    keywords:
      - "Spanish Civil War newsreel"
      - "Spanish Civil War archive footage"
    pinned:
      ia_identifiers:
        - "Newsreels-Spanish-Civil-War"
        - "61114-yesterdays-newsreel-the-spanish-civil-war-vwr"
    search:
      internet_archive:
        - "Spanish Civil War newsreel"
        - "Spanish Civil War archive footage"
        - "Spanish civil war 1936 footage"

  - id: july_1936_uprising
    type: archival_clip
    duration_sec: 30
    keywords:
      - "Spain July 1936 uprising footage"
      - "Barcelona July 1936 footage"
    pinned:
      ia_identifiers:
        - "report-on-the-revolutionary-movement-in-barcelona-1936_202005"
        - "ayudaamadrid1936supportmadridacntfaipresentation"
    search:
      internet_archive:
        - "Spain July 1936 uprising footage"
        - "Barcelona 1936 footage"
        - "Madrid 1936 uprising footage"

  - id: madrid_front
    type: archival_clip
    duration_sec: 30
    keywords:
      - "Madrid civil war newsreel"
      - "Madrid 1936 1937 footage"
    search:
      internet_archive:
        - "Madrid civil war newsreel"
        - "Madrid 1936 1937 footage"
        - "Madrid war footage newsreel"

  - id: barcelona_streets
    type: archival_clip
    duration_sec: 30
    keywords:
      - "Barcelona civil war footage"
      - "Barcelona street militia footage"
    search:
      internet_archive:
        - "Barcelona civil war footage"
        - "Barcelona street militia footage"
        - "Barcelona 1936 barricades footage"

  - id: guernica_and_basque
    type: archival_clip
    duration_sec: 30
