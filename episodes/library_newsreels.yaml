        - "1936-09-09_Terrified_Civilians_Flee_Air_Raid"
        - "MovietoneItalianEthiopianWar"
    search:
      internet_archive:
        - "Guernica bombing newsreel"
        - "Basque country civil war footage"
        - "Bilbao 1937 footage"

  - id: international_brigades
